<!-- templates/admin/dashboard_admin.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Dashboard Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f8f5f1;
    font-family:sans-serif;
}

.sidebar{
    width:270px;
    min-height:100vh;
    background:#8B5E3C;
}

.sidebar-title{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.sidebar .nav-link{
    color:white;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
    font-size:16px;
}

.sidebar .nav-link:hover{
    background:#A67B5B;
}

.active-menu{
    background:white;
    color:#8B5E3C !important;
    font-weight:bold;
}

.navbar-admin{
    background:white;
    border-radius:20px;
}

.content-box{
    background:white;
    border-radius:25px;
    min-height:500px;
}

</style>

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-4">

        <h2 class="sidebar-title mb-5">
            Anyaman Admin
        </h2>

        <ul class="nav flex-column">

            <li class="nav-item">

                <a href="/admin/dashboard"
                   class="nav-link active-menu">

                    <i class="bi bi-grid-fill"></i>
                    Dashboard

                </a>

            </li>

            <li class="nav-item">

                <a href="/admin/pengguna"
                   class="nav-link">

                    <i class="bi bi-people-fill"></i>
                    Kelola Pengguna

                </a>

            </li>

            <li class="nav-item">

                <a href="/admin/pengrajin"
                   class="nav-link">

                    <i class="bi bi-person-workspace"></i>
                    Kelola Pengrajin

                </a>

            </li>

            <li class="nav-item">

                <a href="/admin/video"
                   class="nav-link">

                    <i class="bi bi-play-btn-fill"></i>
                    Kelola Video

                </a>

            </li>

            <li class="nav-item">

                <a href="/admin/produk"
                   class="nav-link">

                    <i class="bi bi-bag-fill"></i>
                    Kelola Produk

                </a>

            </li>

            <li class="nav-item">

                <a href="/admin/sertifikat"
                   class="nav-link">

                    <i class="bi bi-award-fill"></i>
                    Kelola Sertifikat

                </a>

            </li>

            <li class="nav-item mt-5">

                <a href="/admin/logout"
                   class="nav-link bg-danger">

                    <i class="bi bi-box-arrow-right"></i>
                    Logout

                </a>

            </li>

        </ul>

    </div>


    <!-- Content -->
    <div class="flex-grow-1 p-4">

        <!-- Navbar -->
        <div class="navbar-admin shadow-sm p-4 mb-4 d-flex justify-content-between align-items-center">

            <div>

                <h3 class="fw-bold mb-1">
                    Dashboard Admin
                </h3>

                <small class="text-muted">
                    Sistem Informasi Anyaman Nusantara
                </small>

            </div>

            <div class="d-flex align-items-center gap-3">

                <i class="bi bi-person-circle"
                   style="font-size:40px;color:#8B5E3C;"></i>

                <div>

                    <div class="fw-bold">
                        {{ admin }}
                    </div>

                    <small class="text-muted">
                        Administrator
                    </small>

                </div>

            </div>

        </div>


        <!-- Content Kosong -->
        <div class="content-box shadow-sm p-4">

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
