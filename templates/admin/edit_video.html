<!-- templates/admin/edit_video.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Edit Video</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f8f5f1;
    font-family:sans-serif;
}

.card-form{
    border:none;
    border-radius:25px;
}

.btn-coklat{
    background:#8B5E3C;
    color:white;
    border:none;
    border-radius:12px;
}

.btn-coklat:hover{
    background:#6f472b;
    color:white;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
}

textarea{
    resize:none;
}

.thumbnail-preview{
    width:180px;
    height:110px;
    object-fit:cover;
    border-radius:14px;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card card-form shadow-sm">

                <div class="card-body p-5">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div>

                            <h3 class="fw-bold mb-1">
                                Edit Video Tutorial
                            </h3>

                            <small class="text-muted">
                                Perbarui data video pembelajaran
                            </small>

                        </div>

                        <i class="bi bi-pencil-square"
                           style="font-size:45px;color:#8B5E3C;"></i>

                    </div>


                    <form method="POST"
                          enctype="multipart/form-data">

                        <!-- Thumbnail Lama -->
                        <div class="mb-4 text-center">

                            <img src="/static/uploads/{{ video.thumbnail }}"
                                 class="thumbnail-preview">

                        </div>


                        <!-- Upload Thumbnail -->
                        <div class="mb-3">

                            <label class="form-label">
                                Thumbnail Video
                            </label>

                            <input type="file"
                                   name="thumbnail"
                                   class="form-control">

                        </div>


                        <!-- Judul -->
                        <div class="mb-3">

                            <label class="form-label">
                                Judul Video
                            </label>

                            <input type="text"
                                   name="judul_video"
                                   class="form-control"
                                   value="{{ video.judul_video }}"
                                   required>

                        </div>


                        <!-- Kategori -->
                        <div class="mb-3">

                            <label class="form-label">
                                Kategori
                            </label>

                            <select name="kategori"
                                    class="form-select"
                                    required>

                                <option value="Dasar"
                                {% if video.kategori == 'Dasar' %}
                                selected
                                {% endif %}>
                                    Dasar
                                </option>

                                <option value="Tas"
                                {% if video.kategori == 'Tas' %}
                                selected
                                {% endif %}>
                                    Tas
                                </option>

                                <option value="Caping"
                                {% if video.kategori == 'Caping' %}
                                selected
                                {% endif %}>
                                    Caping
                                </option>

                                <option value="Kipas"
                                {% if video.kategori == 'Kipas' %}
                                selected
                                {% endif %}>
                                    Kipas
                                </option>

                            </select>

                        </div>


                        <!-- Deskripsi -->
                        <div class="mb-3">

                            <label class="form-label">
                                Deskripsi
                            </label>

                            <textarea name="deskripsi"
                                      class="form-control"
                                      rows="4">{{ video.deskripsi }}</textarea>

                        </div>


                        <!-- Upload Video -->
                        <div class="mb-3">

                            <label class="form-label">
                                Upload Video Baru
                            </label>

                            <input type="file"
                                   name="video_file"
                                   class="form-control"
                                   accept="video/*">

                            <small class="text-muted">
                                Kosongkan jika tidak ingin mengganti video
                            </small>

                        </div>


                        <!-- Video Lama -->
                        <div class="mb-4">

                            <video width="100%"
                                   height="300"
                                   controls
                                   style="border-radius:14px;object-fit:cover;">

                                <source src="/static/videos/{{ video.video_file }}"
                                        type="video/mp4">

                            </video>

                        </div>


                        <!-- Durasi -->
                        <div class="mb-3">

                            <label class="form-label">
                                Durasi
                            </label>

                            <input type="text"
                                   name="durasi"
                                   class="form-control"
                                   value="{{ video.durasi }}">

                        </div>


                        <!-- Level -->
                        <div class="mb-4">

                            <label class="form-label">
                                Level
                            </label>

                            <select name="level"
                                    class="form-select">

                                <option value="Pemula"
                                {% if video.level == 'Pemula' %}
                                selected
                                {% endif %}>
                                    Pemula
                                </option>

                                <option value="Menengah"
                                {% if video.level == 'Menengah' %}
                                selected
                                {% endif %}>
                                    Menengah
                                </option>

                                <option value="Lanjutan"
                                {% if video.level == 'Lanjutan' %}
                                selected
                                {% endif %}>
                                    Lanjutan
                                </option>

                            </select>

                        </div>


                        <!-- Button -->
                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-coklat px-4">

                                <i class="bi bi-check-circle"></i>
                                Update

                            </button>

                            <a href="/admin/video"
                               class="btn btn-secondary px-4">

                                Kembali

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
