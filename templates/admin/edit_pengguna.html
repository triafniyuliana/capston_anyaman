<!-- templates/admin/edit_pengguna.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Edit Pengguna</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f8f5f1;
    font-family:sans-serif;
}

.card-form{
    border:none;
    border-radius:25px;
}

.btn-coklat{
    background:#8B5E3C;
    color:white;
    border:none;
    border-radius:12px;
}

.btn-coklat:hover{
    background:#6f472b;
    color:white;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.profile-img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:50%;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card card-form shadow-sm">

                <div class="card-body p-5">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div>

                            <h3 class="fw-bold mb-1">
                                Edit Pengguna
                            </h3>

                            <small class="text-muted">
                                Perbarui data pengguna
                            </small>

                        </div>

                        <i class="bi bi-pencil-square"
                           style="font-size:45px;color:#8B5E3C;"></i>

                    </div>


                    <form method="POST"
                          enctype="multipart/form-data">

                        <div class="text-center mb-4">

                            <img src="/static/uploads/{{ pengguna.foto_profile }}"
                                 class="profile-img">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Foto Profile
                            </label>

                            <input type="file"
                                   name="foto_profile"
                                   class="form-control">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   value="{{ pengguna.username }}"
                                   required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Nama Lengkap
                            </label>

                            <input type="text"
                                   name="nama_lengkap"
                                   class="form-control"
                                   value="{{ pengguna.nama_lengkap }}"
                                   required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   value="{{ pengguna.email }}"
                                   required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                No Telepon
                            </label>

                            <input type="text"
                                   name="no_telepon"
                                   class="form-control"
                                   value="{{ pengguna.no_telepon }}">

                        </div>


                        <div class="mb-4">

                            <label class="form-label">
                                Password Baru
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Kosongkan jika tidak diganti">

                        </div>


                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-coklat px-4">

                                <i class="bi bi-check-circle"></i>
                                Update

                            </button>

                            <a href="/admin/pengguna"
                               class="btn btn-secondary px-4">

                                Kembali

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
